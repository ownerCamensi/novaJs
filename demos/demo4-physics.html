<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>NovaJS — Demo 4: Physics</title>
  <style>
    * { margin:0;padding:0;box-sizing:border-box; }
    body { background:#000;overflow:hidden; }
    canvas { width:100vw;height:100vh;display:block; }
    #info { position:fixed;top:15px;left:15px;color:#fff;font-family:monospace;font-size:13px; }
    #btns { position:fixed;bottom:20px;left:50%;transform:translateX(-50%);display:flex;gap:10px; }
    .btn { background:#fff2;border:1px solid #fff4;color:#fff;padding:8px 18px;border-radius:6px;cursor:pointer;font-size:13px; }
    #back { position:fixed;top:15px;right:15px;background:#fff2;border:1px solid #fff4;color:#fff;padding:8px 16px;border-radius:8px;cursor:pointer;font-size:14px;text-decoration:none; }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div id="info">✦ NovaJS — Physics Demo<br>AABB collision · Gravity · Stacking</div>
  <div id="btns">
    <button class="btn" onclick="spawnBox()">Drop Box</button>
    <button class="btn" onclick="spawnMany()">Drop 10</button>
    <button class="btn" onclick="clearAll()">Clear</button>
  </div>
  <a id="back" href="../index.html">← Back</a>

<script type="module">
import * as Nova from '../src/novajs.js';

const canvas = document.getElementById('c');
const engine = new Nova.Engine(canvas);
const scene  = new Nova.Scene();
scene.setBackground(0.06, 0.06, 0.12, 1);

const camera = new Nova.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 200);
camera.position.set(0, 8, 18);
camera.rotation.x = -0.4;

scene.add(new Nova.AmbientLight(0x334466, 0.6));
const dir = new Nova.DirectionalLight(0xffffff, 0.9);
dir.position.set(5, 10, 8); scene.add(dir);

// ── Physics world ─────────────────────────────────────────────────────────────
const world = new Nova.PhysicsWorld();
world.gravity.y = -15;

// Static floor collider
world.addStaticBox(-20, -0.5, -20, 20, 0, 20);

// Walls
world.addStaticBox(-10, 0, -10, -9.5, 20, 10);
world.addStaticBox( 9.5, 0, -10, 10, 20, 10);
world.addStaticBox(-10, 0, -10, 10, 20, -9.5);

// ── Floor mesh ────────────────────────────────────────────────────────────────
const floor = new Nova.Mesh(
  new Nova.PlaneGeometry(20, 20),
  new Nova.BasicMaterial({ color:{ r:0.15, g:0.15, b:0.25 } })
);
scene.add(floor);

const boxMat = new Nova.BasicMaterial({ color:{ r:0.6, g:0.4, b:0.8 } });
const bodies = [];
const colors = [
  {r:0.9,g:0.3,b:0.3},{r:0.3,g:0.8,b:0.4},{r:0.3,g:0.5,b:0.9},
  {r:0.9,g:0.7,b:0.2},{r:0.8,g:0.3,b:0.8},{r:0.3,g:0.8,b:0.8}
];
let colorIdx = 0;

window.spawnBox = () => {
  const size = 0.5 + Math.random() * 0.8;
  const mesh = new Nova.Mesh(
    new Nova.BoxGeometry(size, size, size),
    new Nova.BasicMaterial({ color: colors[colorIdx++ % colors.length] })
  );
  mesh.position.set((Math.random()-0.5)*8, 10, (Math.random()-0.5)*8);
  scene.add(mesh);
  const rb = world.addBody(new Nova.Rigidbody(mesh, {
    halfSize: new Nova.Vector3(size/2, size/2, size/2),
    friction: 0.75
  }));
  rb.velocity.x = (Math.random()-0.5) * 3;
  rb.velocity.z = (Math.random()-0.5) * 3;
  bodies.push({ mesh, rb });
};

window.spawnMany = () => { for(let i=0;i<10;i++) spawnBox(); };

window.clearAll = () => {
  for (const { mesh } of bodies) scene.remove(mesh);
  bodies.length = 0;
  world.bodies.length = 0;
};

// Orbit angle
let angle = 0;
engine.start(scene, camera, (delta, time) => {
  world.step(delta);
  angle += delta * 0.15;
  camera.position.x = Math.sin(angle) * 18;
  camera.position.z = Math.cos(angle) * 18;
  camera.rotation.y = -angle;
});

// Start with some boxes
spawnMany();
</script>
</body>
</html>
